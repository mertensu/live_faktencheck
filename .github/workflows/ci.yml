name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install system dependencies
        run: sudo apt-get install -y portaudio19-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --group test

      - name: Lint
        run: uv run ruff check backend/

      - name: Test
        run: uv run pytest backend/tests -m "not integration" -q
        # Note: no deploy job here. The Hostinger firewall blocks inbound SSH from
        # GitHub runners, so the backend is deployed from the laptop via deploy/deploy.sh
        # (auto-triggered by a local git-push wrapper in ~/.zshrc).
