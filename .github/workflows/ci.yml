name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install system dependencies
        run: sudo apt-get install -y portaudio19-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --group test

      - name: Lint
        run: uv run ruff check backend/

      - name: Test
        run: uv run pytest backend/tests -m "not integration" -q

  deploy-backend:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-backend
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/fact_check
            git fetch --prune origin
            git reset --hard origin/main
            /root/.local/bin/uv sync
            systemctl restart factcheck-backend
            systemctl --no-pager status factcheck-backend | head -5

      - name: Smoke test
        run: curl -fsS https://api.live-faktencheck.de/api/health
